<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKSHOP STORES INVENTORY</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #0a192f; color: #e6f1ff; }
        .container { max-width: 1000px; margin: auto; background: #112240; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #233554; }
        h1 { color: #64ffda; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { color: #8892b0; margin-bottom: 20px; font-size: 0.9em; }
        .subtitle a { color: #64ffda; text-decoration: none; }

        #reader { width: 100%; border: 2px dashed #64ffda; border-radius: 8px; margin-bottom: 20px; background: #0a192f; }
        
        /* Modal for Stock Taking */
        #stockCheckModal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1d2d50; padding: 25px; border-radius: 12px; border: 2px solid #64ffda;
            z-index: 1000; box-shadow: 0 0 50px rgba(0,0,0,0.8); width: 320px; text-align: center;
        }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }

        input { padding: 12px; border-radius: 4px; border: 1px solid #233554; background: #0a192f; color: white; width: 85%; margin-bottom: 15px; font-size: 1.1em; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { border: 1px solid #233554; padding: 12px; text-align: left; }
        th { background-color: #1d2d50; color: #64ffda; text-transform: uppercase; }
        
        .critical { background-color: #441a1a !important; color: #ff6b6b; font-weight: bold; }
        .timestamp { color: #8892b0; font-size: 0.8em; font-style: italic; }
        
        .btn { padding: 12px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.3s; margin: 5px; text-transform: uppercase; }
        .btn-sync { background: #64ffda; color: #0a192f; width: 100%; font-size: 1.1em; margin-top: 25px; }
        .btn-save { background: #64ffda; color: #0a192f; }
        .btn-cancel { background: #8892b0; color: #0a192f; }
        
        footer { text-align: center; margin-top: 40px; color: #8892b0; font-size: 0.85em; border-top: 1px solid #233554; padding-top: 20px; }
    </style>
</head>
<body>

<div id="modalOverlay"></div>
<div id="stockCheckModal">
    <h3 style="color:#64ffda">STOCK CHECK</h3>
    <p id="modalItemName" style="margin-bottom:5px; font-weight: bold;"></p>
    <p id="modalBarcode" style="font-size:0.8em; color:#8892b0; margin-bottom:15px;"></p>
    <input type="number" id="newQty" placeholder="Actual Count on Shelf">
    <br>
    <button class="btn btn-save" onclick="updateStock()">Confirm Count</button>
    <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
</div>

<div class="container">
    <h1>WORKSHOP STORES INVENTORY</h1>
    <div class="subtitle">Powered & Supplied By <a href="https://blucomputers.co.uk" target="_blank">Blucomputers.co.uk</a></div>
    
    <div id="reader"></div>

    <input type="text" id="searchInput" placeholder="Search Part Number, Supplier or Description..." onkeyup="filterTable()" style="width: 97%;">
    
    <table id="inventoryTable">
        <thead>
            <tr>
                <th>Part #</th>
                <th>Description</th>
                <th>Stock</th>
                <th>Min</th>
                <th>Last Checked</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <button class="btn btn-sync" onclick="saveToGitHub()">SYNC TO CLOUD</button>

    <footer>
        Copyright 2026 Blu Computers.<br>
        User Licence VALID 12 months.
    </footer>
</div>

<script>
    // Sample Data with Timestamp field
    let inventory = [
        { barcode: "1001", part: "CPU-FAN-01", desc: "120mm Cooling Fan", stock: 5, min: 10, supplier: "Blu Computers", lastChecked: "2026-02-20 10:00" },
        { barcode: "1002", part: "SSD-500GB", desc: "NVMe M.2 Drive", stock: 20, min: 5, supplier: "Blu Computers", lastChecked: "2026-02-21 14:30" }
    ];
    let currentScanningItem = null;

    function renderTable(data = inventory) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.forEach(item => {
            const isCritical = item.stock < item.min;
            tbody.innerHTML += `
                <tr class="${isCritical ? 'critical' : ''}">
                    <td>${item.part}</td>
                    <td>${item.desc}</td>
                    <td>${item.stock}</td>
                    <td>${item.min}</td>
                    <td class="timestamp">${item.lastChecked || 'Never'}</td>
                </tr>`;
        });
    }

    function onScanSuccess(decodedText) {
        const item = inventory.find(i => i.barcode === decodedText);
        if (item) {
            currentScanningItem = item;
            document.getElementById('modalItemName').innerText = item.desc;
            document.getElementById('modalBarcode').innerText = "PN: " + item.part;
            document.getElementById('newQty').value = "";
            document.getElementById('stockCheckModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('newQty').focus();
        } else {
            alert("New Item! Barcode: " + decodedText + ". Please add to CSV.");
        }
    }

    function updateStock() {
        const newQty = parseInt(document.getElementById('newQty').value);
        if (!isNaN(newQty)) {
            const now = new Date();
            const timestamp = now.getFullYear() + "-" + 
                              (now.getMonth()+1).toString().padStart(2, '0') + "-" + 
                              now.getDate().toString().padStart(2, '0') + " " + 
                              now.getHours().toString().padStart(2, '0') + ":" + 
                              now.getMinutes().toString().padStart(2, '0');
            
            currentScanningItem.stock = newQty;
            currentScanningItem.lastChecked = timestamp;
            renderTable();
            closeModal();
        }
    }

    function closeModal() {
        document.getElementById('stockCheckModal').style.display = 'none';
        document.getElementById('modalOverlay').style.display = 'none';
        currentScanningItem = null;
    }

    function filterTable() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = inventory.filter(item => 
            item.part.toLowerCase().includes(query) || 
            item.desc.toLowerCase().includes(query) ||
            item.supplier.toLowerCase().includes(query)
        );
        renderTable(filtered);
    }

    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
    renderTable();

    function saveToGitHub() { 
        // This is where your API logic from earlier connects
        alert("Preparing data... Syncing all stock levels and timestamps to Cloud."); 
    }
</script>
</body>
</html>
