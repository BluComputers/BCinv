<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKSHOP STORES INVENTORY</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #0a192f; color: #e6f1ff; }
        .container { max-width: 1000px; margin: auto; background: #112240; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #233554; position: relative; }
        .logo-badge { position: absolute; top: 20px; right: 20px; width: 60px; height: auto; border-radius: 4px; }
        h1 { color: #ffffff; margin: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 1.8em; }
        .subtitle { color: #8892b0; margin-bottom: 20px; font-size: 0.9em; }
        .subtitle a { color: #64ffda; text-decoration: none; }
        #reader { width: 100%; border: 2px dashed #64ffda; border-radius: 8px; margin-bottom: 20px; background: #0a192f; }
        
        /* Modals */
        #stockCheckModal, #newItemModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1d2d50; padding: 25px; border-radius: 12px; border: 2px solid #64ffda; z-index: 1000; box-shadow: 0 0 50px rgba(0,0,0,0.8); width: 320px; text-align: center; }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        
        input { padding: 12px; border-radius: 4px; border: 1px solid #233554; background: #0a192f; color: white; width: 85%; margin-bottom: 10px; font-size: 1em; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { border: 1px solid #233554; padding: 12px; text-align: left; }
        th { background-color: #1d2d50; color: #64ffda; text-transform: uppercase; }
        .critical { background-color: #441a1a !important; color: #ff6b6b; font-weight: bold; }
        .timestamp { color: #8892b0; font-size: 0.8em; font-style: italic; }
        
        .btn { padding: 12px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.3s; margin: 5px; text-transform: uppercase; }
        .btn-sync { background: #64ffda; color: #0a192f; width: 100%; font-size: 1.1em; margin-top: 25px; }
        .btn-save { background: #64ffda; color: #0a192f; }
        .btn-cancel { background: #8892b0; color: #0a192f; }
        
        footer { text-align: center; margin-top: 40px; color: #8892b0; font-size: 0.85em; border-top: 1px solid #233554; padding-top: 20px; }
    </style>
</head>
<body>

<div id="modalOverlay"></div>

<div id="stockCheckModal">
    <h3 style="color:#64ffda">STOCK CHECK</h3>
    <p id="modalItemName" style="margin-bottom:5px; font-weight: bold;"></p>
    <input type="number" id="newQty" placeholder="Actual Count on Shelf">
    <button class="btn btn-save" onclick="updateStock()">Confirm</button>
    <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
</div>

<div id="newItemModal">
    <h3 style="color:#64ffda">ADD NEW PART</h3>
    <input type="text" id="newPartBC" readonly style="opacity: 0.6;">
    <input type="text" id="newPartNo" placeholder="Part Number">
    <input type="text" id="newPartDesc" placeholder="Description">
    <input type="number" id="newPartMin" placeholder="Min Stock Level">
    <button class="btn btn-save" onclick="addNewItem()">Add to List</button>
    <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
</div>

<div class="container">
    <img src="https://www.blucomputers.co.uk/gallery_gen/cd6f202757dcc4e33c805062d83679ca_fit.png?ts=1766441461" alt="Logo" class="logo-badge">
    <h1>WORKSHOP STORES INVENTORY</h1>
    <div class="subtitle">Powered & Supplied By <a href="https://blucomputers.co.uk" target="_blank">Blucomputers.co.uk</a></div>
    
    <div id="reader"></div>

    <input type="text" id="searchInput" placeholder="Search Inventory..." onkeyup="filterTable()" style="width: 97%;">
    
    <table id="inventoryTable">
        <thead>
            <tr>
                <th>Part #</th>
                <th>Description</th>
                <th>Stock</th>
                <th>Min</th>
                <th>Last Checked</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <button class="btn btn-sync" onclick="saveToGitHub()">SYNC TO CLOUD</button>

    <footer>
        &copy; Copyright 2026 Blu Computers.<br>
        User Licence VALID 12 months.
    </footer>
</div>

<script>
    // --- GITHUB CONFIGURATION ---
    const GITHUB_USER = "BluComputers"; 
    const GITHUB_REPO = "BCinv";
    const FILE_PATH = "data.json";
    
    let inventory = [];
    let fileSha = "";
    let currentScanningItem = null;

    async function loadFromCloud() {
        try {
            const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
            const response = await fetch(url);
            const data = await response.json();
            fileSha = data.sha;
            inventory = JSON.parse(atob(data.content));
            renderTable();
        } catch (e) {
            console.log("Database file not found or empty.");
        }
    }

    function renderTable(data = inventory) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.sort((a, b) => (a.stock < a.min) ? -1 : 1); // Put low stock at top
        data.forEach(item => {
            const isCritical = item.stock < item.min;
            tbody.innerHTML += `<tr class="${isCritical ? 'critical' : ''}">
                <td>${item.part}</td><td>${item.desc}</td><td>${item.stock}</td><td>${item.min}</td>
                <td class="timestamp">${item.lastChecked || 'Never'}</td></tr>`;
        });
    }

    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render((decodedText) => {
        const item = inventory.find(i => i.barcode === decodedText);
        if (item) {
            currentScanningItem = item;
            document.getElementById('modalItemName').innerText = item.desc;
            document.getElementById('newQty').value = "";
            showModal('stockCheckModal');
        } else {
            document.getElementById('newPartBC').value = decodedText;
            showModal('newItemModal');
        }
    });

    function showModal(id) {
        document.getElementById(id).style.display = 'block';
        document.getElementById('modalOverlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('stockCheckModal').style.display = 'none';
        document.getElementById('newItemModal').style.display = 'none';
        document.getElementById('modalOverlay').style.display = 'none';
    }

    function updateStock() {
        const newQty = parseInt(document.getElementById('newQty').value);
        if (!isNaN(newQty)) {
            currentScanningItem.stock = newQty;
            currentScanningItem.lastChecked = new Date().toLocaleString();
            renderTable();
            closeModal();
        }
    }

    function addNewItem() {
        const newItem = {
            barcode: document.getElementById('newPartBC').value,
            part: document.getElementById('newPartNo').value,
            desc: document.getElementById('newPartDesc').value,
            stock: 0,
            min: parseInt(document.getElementById('newPartMin').value) || 0,
            supplier: "Blu Computers",
            lastChecked: new Date().toLocaleString()
        };
        inventory.push(newItem);
        renderTable();
        closeModal();
    }

    function filterTable() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        renderTable(inventory.filter(i => i.part.toLowerCase().includes(query) || i.desc.toLowerCase().includes(query)));
    }

    async function saveToGitHub() {
        const token = prompt("Enter GitHub Access Token:");
        if (!token) return;

        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        const response = await fetch(url, {
            method: "PUT",
            headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                message: "Workshop Sync: " + new Date().toLocaleString(),
                content: btoa(JSON.stringify(inventory, null, 2)),
                sha: fileSha
            })
        });

        if (response.ok) {
            alert("SUCCESS: Database Updated.");
            loadFromCloud();
        } else {
            alert("ERROR: Check token permissions or file path.");
        }
    }

    loadFromCloud();
</script>
</body>
</html>
